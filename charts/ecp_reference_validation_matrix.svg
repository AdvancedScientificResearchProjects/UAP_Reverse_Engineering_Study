<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="920" viewBox="0 0 1360 920" role="img" aria-labelledby="title desc">
  <title id="title">ECP Reference Validation Matrix</title>
  <desc id="desc">A parameter-level matrix comparing the three recorded ECP responses to the disclosed reference.</desc>
  <rect width="1360" height="920" fill="#fcfcfa"/>
  <text x="40" y="52" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2937">ECP Reference Validation Matrix</text>
  <text x="40" y="82" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b5563">Parameter-level comparison from the validation report. Green = exact, amber = partial or indirect, red = incorrect, gray = no data.</text>

  <rect x="40" y="110" width="18" height="18" fill="#9ad17b" stroke="#64748b"/>
  <text x="66" y="124" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">exact</text>
  <rect x="140" y="110" width="18" height="18" fill="#f6c85f" stroke="#64748b"/>
  <text x="166" y="124" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">partial / indirect</text>
  <rect x="330" y="110" width="18" height="18" fill="#f29c99" stroke="#64748b"/>
  <text x="356" y="124" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">incorrect</text>
  <rect x="470" y="110" width="18" height="18" fill="#d9d9d9" stroke="#64748b"/>
  <text x="496" y="124" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">no data</text>

  <rect x="40" y="162" width="500" height="42" fill="#1f2937"/>
