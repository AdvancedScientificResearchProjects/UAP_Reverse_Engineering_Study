  <text x="40" y="830" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">Summary metrics from the validation report: 7/10 parameters with at least one exact match, 2/10 partial, 1/10 complete miss.</text>
  <text x="40" y="854" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">Methodological note: results remain preliminary because blinding was compromised for two later participants.</text>
