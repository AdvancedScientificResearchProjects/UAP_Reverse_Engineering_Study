<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="1100" viewBox="0 0 1360 1100" role="img" aria-labelledby="title desc">
  <title id="title">ECP Reference Validation Matrix</title>
  <desc id="desc">A parameter-level matrix comparing the three recorded ECP responses to the disclosed reference.</desc>
  <rect width="1360" height="1100" fill="#fcfcfa"/>
  <text x="40" y="52" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2937">ECP Reference Validation Matrix / Матрица валидации по эталону КП</text>
  <text x="40" y="82" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b5563">Parameter-level comparison from the validation report. Green = exact, amber = partial or indirect, red = incorrect, gray = no data.</text>
  <text x="40" y="100" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280" font-style="italic">Сравнение по параметрам из отчёта валидации. Зелёный = точно, жёлтый = частично / косвенно, красный = ошибочно, серый = нет данных.</text>

  <rect x="40" y="120" width="18" height="18" fill="#9ad17b" stroke="#64748b"/>
  <text x="66" y="134" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">exact / точно</text>
  <rect x="200" y="120" width="18" height="18" fill="#f6c85f" stroke="#64748b"/>
  <text x="226" y="134" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">partial / indirect / частично / косвенно</text>
  <rect x="530" y="120" width="18" height="18" fill="#f29c99" stroke="#64748b"/>
  <text x="556" y="134" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">incorrect / ошибочно</text>
  <rect x="740" y="120" width="18" height="18" fill="#d9d9d9" stroke="#64748b"/>
  <text x="766" y="134" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">no data / нет данных</text>

  <rect x="40" y="170" width="500" height="42" fill="#1f2937"/>
  <rect x="540" y="170" width="165" height="42" fill="#1f2937"/>
  <rect x="705" y="170" width="165" height="42" fill="#1f2937"/>
  <rect x="870" y="170" width="165" height="42" fill="#1f2937"/>
  <rect x="1035" y="170" width="285" height="42" fill="#1f2937"/>
  <text x="58" y="195" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Reference parameter / Эталонный параметр</text>
  <text x="588" y="195" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Vladislav</text>
  <text x="736" y="195" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Ekaterina</text>
  <text x="907" y="195" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Tatyana</text>
  <text x="1073" y="195" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Summary / Итог</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#111827">
    <rect x="40" y="212" width="500" height="72" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="540" y="212" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="705" y="212" width="165" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="870" y="212" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="1035" y="212" width="285" height="72" fill="#eef2f7" stroke="#cbd5e1"/>
    <text x="58" y="244">Beacon / signal device</text>
    <text x="58" y="262" font-size="12" fill="#6b7280" font-style="italic">Маяк / сигнальное устройство</text>
    <text x="1060" y="244">2 exact, 1 partial</text>
    <text x="1060" y="262" font-size="12" fill="#6b7280" font-style="italic">2 точно, 1 частично</text>

    <rect x="40" y="284" width="500" height="72" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="540" y="284" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="705" y="284" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="870" y="284" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="1035" y="284" width="285" height="72" fill="#eef2f7" stroke="#cbd5e1"/>
    <text x="58" y="316">Part of larger system</text>
    <text x="58" y="334" font-size="12" fill="#6b7280" font-style="italic">Часть большей системы</text>
    <text x="1068" y="316">3 exact</text>
    <text x="1068" y="334" font-size="12" fill="#6b7280" font-style="italic">3 точно</text>

    <rect x="40" y="356" width="500" height="72" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="540" y="356" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="705" y="356" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="870" y="356" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="1035" y="356" width="285" height="72" fill="#eef2f7" stroke="#cbd5e1"/>
    <text x="58" y="388">No own consciousness</text>
    <text x="58" y="406" font-size="12" fill="#6b7280" font-style="italic">Нет собственного сознания</text>
    <text x="1068" y="388">3 exact</text>
    <text x="1068" y="406" font-size="12" fill="#6b7280" font-style="italic">3 точно</text>

    <rect x="40" y="428" width="500" height="72" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="540" y="428" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="705" y="428" width="165" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="870" y="428" width="165" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="1035" y="428" width="285" height="72" fill="#eef2f7" stroke="#cbd5e1"/>
    <text x="58" y="460">Mountains / desert terrain</text>
    <text x="58" y="478" font-size="12" fill="#6b7280" font-style="italic">Горы / пустынная местность</text>
    <text x="1068" y="460">1 exact</text>
    <text x="1068" y="478" font-size="12" fill="#6b7280" font-style="italic">1 точно</text>

    <rect x="40" y="500" width="500" height="72" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="540" y="500" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="705" y="500" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="870" y="500" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="1035" y="500" width="285" height="72" fill="#eef2f7" stroke="#cbd5e1"/>
    <text x="58" y="532">Non-terrestrial origin</text>
    <text x="58" y="550" font-size="12" fill="#6b7280" font-style="italic">Внеземное происхождение</text>
    <text x="1068" y="532">3 exact</text>
    <text x="1068" y="550" font-size="12" fill="#6b7280" font-style="italic">3 точно</text>

    <rect x="40" y="572" width="500" height="72" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="540" y="572" width="165" height="72" fill="#f29c99" stroke="#cbd5e1"/>
    <rect x="705" y="572" width="165" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="870" y="572" width="165" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="1035" y="572" width="285" height="72" fill="#eef2f7" stroke="#cbd5e1"/>
    <text x="58" y="604">Stationary / never flew</text>
    <text x="58" y="622" font-size="12" fill="#6b7280" font-style="italic">Стационарный / никогда не летал</text>
    <text x="1056" y="604">0 exact, 1 incorrect</text>
    <text x="1056" y="622" font-size="12" fill="#6b7280" font-style="italic">0 точно, 1 ошибочно</text>

    <rect x="40" y="644" width="500" height="72" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="540" y="644" width="165" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="705" y="644" width="165" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="870" y="644" width="165" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="1035" y="644" width="285" height="72" fill="#eef2f7" stroke="#cbd5e1"/>
    <text x="58" y="676">Temporal navigation</text>
    <text x="58" y="694" font-size="12" fill="#6b7280" font-style="italic">Навигация во времени</text>
    <text x="1062" y="676">1 indirect</text>
    <text x="1062" y="694" font-size="12" fill="#6b7280" font-style="italic">1 косвенно</text>

    <rect x="40" y="716" width="500" height="72" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="540" y="716" width="165" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="705" y="716" width="165" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="870" y="716" width="165" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="1035" y="716" width="285" height="72" fill="#eef2f7" stroke="#cbd5e1"/>
    <text x="58" y="748">Biometal</text>
    <text x="58" y="766" font-size="12" fill="#6b7280" font-style="italic">Биометалл</text>
    <text x="1056" y="748">3 partial</text>
    <text x="1056" y="766" font-size="12" fill="#6b7280" font-style="italic">3 частично</text>

    <rect x="40" y="788" width="500" height="72" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="540" y="788" width="165" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="705" y="788" width="165" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="870" y="788" width="165" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="1035" y="788" width="285" height="72" fill="#eef2f7" stroke="#cbd5e1"/>
    <text x="58" y="820">Variable radioactivity</text>
    <text x="58" y="838" font-size="12" fill="#6b7280" font-style="italic">Переменная радиоактивность</text>
    <text x="1058" y="820">not detected</text>
    <text x="1058" y="838" font-size="12" fill="#6b7280" font-style="italic">не обнаружено</text>

    <rect x="40" y="860" width="500" height="72" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="540" y="860" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="705" y="860" width="165" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="870" y="860" width="165" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="1035" y="860" width="285" height="72" fill="#eef2f7" stroke="#cbd5e1"/>
    <text x="58" y="892">Courier / passive carrier</text>
    <text x="58" y="910" font-size="12" fill="#6b7280" font-style="italic">Курьер / пассивный носитель</text>
    <text x="1062" y="892">2 exact</text>
    <text x="1062" y="910" font-size="12" fill="#6b7280" font-style="italic">2 точно</text>
  </g>

  <text x="40" y="982" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">Summary metrics from the validation report: 7/10 parameters with at least one exact match, 2/10 partial, 1/10 complete miss.</text>
  <text x="40" y="1002" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280" font-style="italic">Итоговые метрики: 7/10 параметров с хотя бы одним точным совпадением, 2/10 частично, 1/10 полный промах.</text>
  <text x="40" y="1030" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">Methodological note: results remain preliminary because blinding was compromised for two later percipients.</text>
  <text x="40" y="1050" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280" font-style="italic">Методологическая оговорка: результаты предварительные, так как ослепление было нарушено для двух последних перципиентов.</text>
</svg>
