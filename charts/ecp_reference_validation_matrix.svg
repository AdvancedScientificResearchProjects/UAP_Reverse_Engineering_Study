  <rect x="1035" y="162" width="285" height="42" fill="#1f2937"/>
  <text x="58" y="189" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Reference parameter</text>
  <text x="588" y="189" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Vladislav</text>
  <text x="736" y="189" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Ekaterina</text>
  <text x="907" y="189" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Tatyana</text>
  <text x="1073" y="189" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Summary</text>

