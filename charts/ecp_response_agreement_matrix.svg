<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ECP Response Agreement Matrix</title>
  <desc id="desc">A descriptive matrix of repeated themes across the three recorded ECP responses.</desc>
  <rect width="1280" height="760" fill="#fbfbf8"/>
