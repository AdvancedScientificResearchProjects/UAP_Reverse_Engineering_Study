<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="920" viewBox="0 0 1280 920" role="img" aria-labelledby="title desc">
  <title id="title">ECP Response Agreement Matrix</title>
  <desc id="desc">A descriptive matrix of repeated themes across the three recorded ECP responses.</desc>
  <rect width="1280" height="920" fill="#fbfbf8"/>
  <text x="40" y="52" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2937">ECP Response Agreement Matrix / Матрица согласованности ответов КП</text>
  <text x="40" y="82" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b5563">Descriptive overlap across recorded responses. Not a claim of independent convergence.</text>
  <text x="40" y="100" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280" font-style="italic">Описательное совпадение в записанных ответах. Не является утверждением независимой конвергенции.</text>

  <rect x="40" y="120" width="18" height="18" fill="#9ad17b" stroke="#64748b"/>
  <text x="66" y="134" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">present / ясно</text>
  <rect x="220" y="120" width="18" height="18" fill="#f6c85f" stroke="#64748b"/>
  <text x="246" y="134" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">partial / частично</text>
  <rect x="440" y="120" width="18" height="18" fill="#d9d9d9" stroke="#64748b"/>
  <text x="466" y="134" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">absent / нет сигнала</text>
  <rect x="660" y="120" width="18" height="18" fill="#f29c99" stroke="#64748b"/>
  <text x="686" y="134" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">contradictory / противоречиво</text>

  <rect x="40" y="170" width="420" height="42" fill="#1f2937"/>
  <rect x="460" y="170" width="170" height="42" fill="#1f2937"/>
  <rect x="630" y="170" width="170" height="42" fill="#1f2937"/>
  <rect x="800" y="170" width="170" height="42" fill="#1f2937"/>
  <rect x="970" y="170" width="270" height="42" fill="#1f2937"/>
  <text x="58" y="193" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Theme / Тема</text>
  <text x="496" y="193" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Vladislav</text>
  <text x="661" y="193" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Ekaterina</text>
  <text x="836" y="193" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Tatyana</text>
  <text x="1012" y="193" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Agreement / Согласованность</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">
    <rect x="40" y="212" width="420" height="72" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="460" y="212" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="630" y="212" width="170" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="800" y="212" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="970" y="212" width="270" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <text x="58" y="244">Signal / beacon-like function</text>
    <text x="58" y="262" font-size="12" fill="#6b7280" font-style="italic">Сигнальная / маяковая функция</text>
    <text x="1060" y="252" font-weight="700">MEDIUM</text>

    <rect x="40" y="284" width="420" height="72" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="460" y="284" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="630" y="284" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="800" y="284" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="970" y="284" width="270" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <text x="58" y="316">Part of a larger system</text>
    <text x="58" y="334" font-size="12" fill="#6b7280" font-style="italic">Часть большей системы</text>
    <text x="1084" y="324" font-weight="700">HIGH</text>

    <rect x="40" y="356" width="420" height="72" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="460" y="356" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="630" y="356" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="800" y="356" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="970" y="356" width="270" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <text x="58" y="388">No autonomous consciousness</text>
    <text x="58" y="406" font-size="12" fill="#6b7280" font-style="italic">Нет автономного сознания</text>
    <text x="1084" y="396" font-weight="700">HIGH</text>

    <rect x="40" y="428" width="420" height="72" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="460" y="428" width="170" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="630" y="428" width="170" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="800" y="428" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="970" y="428" width="270" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <text x="58" y="460">Non-terrestrial origin</text>
    <text x="58" y="478" font-size="12" fill="#6b7280" font-style="italic">Внеземное происхождение</text>
    <text x="1060" y="468" font-weight="700">MEDIUM</text>

    <rect x="40" y="500" width="420" height="72" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="460" y="500" width="170" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="630" y="500" width="170" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="800" y="500" width="170" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="970" y="500" width="270" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <text x="58" y="532">Non-standard mineral / material</text>
    <text x="58" y="550" font-size="12" fill="#6b7280" font-style="italic">Нестандартный минеральный материал</text>
    <text x="1060" y="540" font-weight="700">MEDIUM</text>

    <rect x="40" y="572" width="420" height="72" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="460" y="572" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="630" y="572" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="800" y="572" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="970" y="572" width="270" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <text x="58" y="604">Upward channel / above ajna-sahasrara</text>
    <text x="58" y="622" font-size="12" fill="#6b7280" font-style="italic">Восходящий энергетический канал</text>
    <text x="1084" y="612" font-weight="700">HIGH</text>

    <rect x="40" y="644" width="420" height="72" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="460" y="644" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="630" y="644" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="800" y="644" width="170" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <rect x="970" y="644" width="270" height="72" fill="#9ad17b" stroke="#cbd5e1"/>
    <text x="58" y="676">No direct danger perceived</text>
    <text x="58" y="694" font-size="12" fill="#6b7280" font-style="italic">Безопасен для перципиента</text>
    <text x="1084" y="684" font-weight="700">HIGH</text>

    <rect x="40" y="716" width="420" height="72" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="460" y="716" width="170" height="72" fill="#f29c99" stroke="#cbd5e1"/>
    <rect x="630" y="716" width="170" height="72" fill="#f6c85f" stroke="#cbd5e1"/>
    <rect x="800" y="716" width="170" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <rect x="970" y="716" width="270" height="72" fill="#d9d9d9" stroke="#cbd5e1"/>
    <text x="58" y="748">Dynamic movement / flight</text>
    <text x="58" y="766" font-size="12" fill="#6b7280" font-style="italic">Динамика полёта / перемещение</text>
    <text x="1088" y="756" font-weight="700">LOW</text>
  </g>

  <text x="40" y="838" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">Source basis: analysis/cross_comparison.md, session ECP-2026-04-04.</text>
  <text x="40" y="862" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">Interpretive caution: Ekaterina and Tatyana heard earlier responses during the same group call.</text>
  <text x="40" y="886" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280" font-style="italic">Методологическая оговорка: Екатерина и Татьяна слышали более ранние ответы во время того же группового звонка.</text>
</svg>
