    .hdr-ru { font-family:Arial,Helvetica,sans-serif; font-size:10px; fill:#cbd5e1; text-anchor:middle; font-style:italic; }
    .param { font-family:Arial,Helvetica,sans-serif; font-size:13px; fill:#0f172a; font-weight:600; }
    .param-ru { font-family:Arial,Helvetica,sans-serif; font-size:10px; fill:#64748b; font-style:italic; }
