  <text class="legend" x="52" y="114">✅ STABLE / устойчиво</text>
  <rect x="220" y="102" width="14" height="14" class="drifted stroke"/>
  <text class="legend" x="240" y="114">⚠️ DRIFTED / дрейф</text>
  <rect x="400" y="102" width="14" height="14" class="contradicted stroke"/>
