    .badge { font-family:Arial,Helvetica,sans-serif; font-size:12px; font-weight:700; text-anchor:middle; fill:#0f172a; }
    .stable { fill:#9ad17b; }
    .drifted { fill:#f6c85f; }
    .contradicted { fill:#f29c99; }
    .rowA { fill:#f8fafc; }
    .rowB { fill:#ffffff; }
    .stroke { stroke:#cbd5e1; stroke-width:1; }
    .footer { font-family:Arial,Helvetica,sans-serif; font-size:12px; fill:#475569; }
    .footer-ru { font-family:Arial,Helvetica,sans-serif; font-size:11px; fill:#6b7280; font-style:italic; }
    .legend { font-family:Arial,Helvetica,sans-serif; font-size:12px; fill:#334155; }
  </style>
  <rect class="bg" width="1060" height="1120"/>
  <text class="title" x="32" y="44">Numerical Parameters — Stability vs Drift / Числовые параметры — устойчивость и дрейф</text>
  <text class="subtitle" x="32" y="68">20 key quantitative claims, year of first statement vs last restatement. Status per §0.0 consolidated table.</text>
  <text class="subtitle-ru" x="32" y="86">20 ключевых количественных заявлений, год первой формулировки и последнего повторения. Статус — по сводной таблице §0.0.</text>

