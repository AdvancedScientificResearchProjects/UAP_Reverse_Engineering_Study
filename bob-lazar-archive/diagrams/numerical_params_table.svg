<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="1120" viewBox="0 0 1060 1120" role="img" aria-labelledby="title desc">
  <title id="title">Bob Lazar — Numerical Parameters Stability Table</title>
  <desc id="desc">Key numerical parameters versus year of first and last restatement, with stability badges.</desc>
  <style>
