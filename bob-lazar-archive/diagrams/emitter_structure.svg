<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <style>
    .bg      { fill: #ffffff; }
    .part    { fill: none; stroke: #000; stroke-width: 1.8; }
    .thin    { fill: none; stroke: #000; stroke-width: 1; }
    .dim     { fill: none; stroke: #000; stroke-width: 0.8; }
    .dashed  { fill: none; stroke: #000; stroke-width: 1; stroke-dasharray: 4 3; }
    .trumpet { fill: #1a1a1a; stroke: #000; stroke-width: 2; }
    .interior{ fill: #2e2e2e; stroke: #000; stroke-width: 1.2; }
    .copper  { fill: #7a5a3a; stroke: #000; stroke-width: 0.8; }
    .tube    { fill: #b8b8b8; stroke: #000; stroke-width: 1.2; }
    .label   { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 12px; fill: #000; }
    .label-sm{ font-family: "Helvetica Neue", Arial, sans-serif; font-size: 10px; fill: #000; }
    .label-ru{ font-family: "Helvetica Neue", Arial, sans-serif; font-size: 10px; fill: #333; font-style: italic; }
    .title   { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #000; }
    .src     { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 10px; fill: #555; }
  </style>

  <rect class="bg" width="900" height="700"/>

  <!-- Title band -->
  <rect x="0" y="0" width="900" height="44" fill="#000"/>
  <text x="450" y="20" text-anchor="middle" class="title" fill="#fff">Gravity Amplifier Emitter ("Trumpet") / Эмиттер гравитационного усилителя («раструб»)</text>
  <text x="450" y="36" text-anchor="middle" class="label-sm" fill="#fff">Lower-level emitter, cross-section + detail · Нижний уровень, разрез и детализация</text>

  <!-- Reference ceiling (hull bottom) -->
  <line x1="90" y1="90" x2="520" y2="90" class="thin"/>
  <text x="90" y="82" class="label-sm">Hull underside / Дно корпуса</text>

  <!-- Support tube (3-inch / 76 mm) -->
  <rect x="280" y="90" width="30" height="150" class="tube"/>

  <!-- Amplifier body (above, partial, grey) -->
  <!-- not shown — tube drops out of hull -->

  <!-- Trumpet / funnel, cross-section. Flaring outward toward bottom. -->
  <!-- Outer wall -->
  <path d="M 260 240 L 245 260 L 205 445 L 410 445 L 370 260 L 335 240 Z" class="trumpet"/>
  <!-- Inner (hollow) lighter interior -->
  <path d="M 270 250 L 258 268 L 225 430 L 390 430 L 357 268 L 325 250 Z" class="interior"/>

  <!-- Copper-colored rectangular plates lining interior (capacitor-plate style) -->
  <g>
    <!-- left side plates -->
    <rect x="237" y="285" width="10" height="30" class="copper"/>
    <rect x="233" y="325" width="10" height="30" class="copper"/>
    <rect x="229" y="365" width="10" height="30" class="copper"/>
    <rect x="225" y="405" width="10" height="25" class="copper"/>
    <!-- right side plates -->
    <rect x="368" y="285" width="10" height="30" class="copper"/>
    <rect x="372" y="325" width="10" height="30" class="copper"/>
    <rect x="376" y="365" width="10" height="30" class="copper"/>
    <rect x="380" y="405" width="10" height="25" class="copper"/>
  </g>

  <!-- Hollow bottom indicated (arrow into interior) -->
  <line x1="308" y1="500" x2="308" y2="445" class="thin"/>
  <polygon points="308,445 303,455 313,455" fill="#000"/>
  <text x="240" y="520" class="label">Open / hollow bottom</text>
  <text x="240" y="533" class="label-ru">Открытая / полая нижняя часть</text>

  <!-- Rotation arc (20° activation angle) -->
  <g transform="translate(308 240)">
    <line x1="0" y1="0" x2="0" y2="220" class="dashed"/>
    <!-- rotated pivot indicator -->
    <line x1="0" y1="0" x2="75" y2="208" stroke="#000" stroke-width="1" stroke-dasharray="3 2"/>
    <path d="M 0 80 A 80 80 0 0 1 28 75" fill="none" stroke="#000" stroke-width="1"/>
    <text x="12" y="102" class="label-sm" transform="rotate(0)">20°</text>
  </g>

  <!-- Dimension: support tube diameter 3" -->
  <line x1="280" y1="65" x2="310" y2="65" class="dim"/>
  <polygon points="280,65 284,61 284,69" fill="#000"/>
  <polygon points="310,65 306,61 306,69" fill="#000"/>
  <text x="320" y="69" class="label-sm">3" (76 mm)</text>

  <!-- Callouts -->
  <!-- Support tube -->
  <line x1="295" y1="150" x2="560" y2="120" class="thin"/>
  <text x="570" y="118" class="label">Support tube — Ø 3" (76 mm)</text>
  <text x="570" y="131" class="label-ru">Труба подвеса — Ø 3" (76 мм)</text>
  <text x="570" y="144" class="label-sm">Pewter gray, "compression-resistant"</text>
  <text x="570" y="156" class="label-ru">Цвет олова, «устойчива к сжатию»</text>
  <text x="570" y="168" class="label-sm">— no buckling when bent (JRE2479)</text>
  <text x="570" y="180" class="label-ru">— не коробится при изгибе</text>

  <!-- Trumpet outer -->
  <line x1="250" y1="360" x2="110" y2="300" class="thin"/>
  <text x="40" y="290" class="label">Trumpet body</text>
  <text x="40" y="303" class="label-ru">Корпус раструба</text>
  <text x="40" y="316" class="label-sm">Matte black / Матово-чёрный</text>
  <text x="40" y="328" class="label-sm">Tapers outward toward base</text>
  <text x="40" y="340" class="label-ru">Расширяется книзу</text>

  <!-- Copper plates -->
  <line x1="388" y1="330" x2="560" y2="260" class="thin"/>
  <text x="570" y="255" class="label">Copper-colored rectangular plates</text>
  <text x="570" y="268" class="label-ru">Медно-красные прямоугольные пластины</text>
  <text x="570" y="281" class="label-sm">Line interior (capacitor-plate style)</text>
  <text x="570" y="293" class="label-ru">По внутренней стенке (как пластины конденсатора)</text>

  <!-- Rotation behavior -->
  <line x1="380" y1="430" x2="570" y2="400" class="thin"/>
  <text x="580" y="395" class="label">Rotation past 20° activates reactor</text>
  <text x="580" y="408" class="label-ru">Поворот свыше 20° включает реактор</text>
  <text x="580" y="421" class="label-sm">Below 20° = idle / hover mode</text>
  <text x="580" y="433" class="label-ru">До 20° — холостой / hover-режим</text>
  <text x="580" y="445" class="label-sm">Source: S4DOC-26, JRE2479 §3.4</text>

  <!-- Bend / compression resistance inset -->
  <g transform="translate(80 520)">
    <text x="0" y="-5" class="label-sm">Compression test (conceptual)</text>
    <text x="0" y="8" class="label-ru">Испытание на сжатие (концептуально)</text>
    <!-- straight tube -->
    <rect x="0" y="20" width="120" height="14" class="tube"/>
    <text x="130" y="31" class="label-sm">→ bent without buckling</text>
    <text x="130" y="43" class="label-ru">→ изогнута без потери формы</text>
    <!-- curved tube -->
    <path d="M 0 65 Q 60 40, 120 65 L 120 79 Q 60 54, 0 79 Z" class="tube"/>
  </g>

  <!-- Emitter assembly label -->
  <line x1="308" y1="445" x2="570" y2="470" class="thin"/>
  <text x="580" y="467" class="label">Emitter face (open bottom)</text>
  <text x="580" y="480" class="label-ru">Излучающая поверхность (открытый низ)</text>
  <text x="580" y="493" class="label-sm">Beam exits downward/outward</text>
  <text x="580" y="505" class="label-ru">Луч идёт вниз/наружу</text>

  <!-- Footer -->
  <line x1="40" y1="650" x2="860" y2="650" class="thin"/>
  <text x="450" y="668" text-anchor="middle" class="src">Source / Источник: Bob Lazar — S4DOC-26, JRE2479, BL18 · §3.4, §5.5</text>
  <text x="450" y="682" text-anchor="middle" class="src">ASRP v2.1 · bob-lazar-archive/diagrams/emitter_structure.svg</text>
</svg>
