<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700">
  <style>
    .bg       { fill: #ffffff; }
    .part     { fill: none; stroke: #000; stroke-width: 1.8; }
    .thin     { fill: none; stroke: #000; stroke-width: 1; }
    .dim      { fill: none; stroke: #000; stroke-width: 0.8; }
    .dashed   { fill: none; stroke: #000; stroke-width: 1; stroke-dasharray: 4 3; }
    .coil     { fill: #f5f5f0; stroke: #000; stroke-width: 1.4; }
    .core     { fill: #d9d9d9; stroke: #000; stroke-width: 1.2; }
    .lead     { fill: none; stroke: #000; stroke-width: 1.5; }
    .gen      { fill: #fff5cc; stroke: #000; stroke-width: 1.4; }
    .wave1    { fill: none; stroke: #b34700; stroke-width: 1.4; }
    .wave2    { fill: none; stroke: #006a4e; stroke-width: 1.4; }
    .wave3    { fill: none; stroke: #0050a0; stroke-width: 1.4; }
    .label    { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 12px; fill: #000; }
    .label-sm { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 10px; fill: #000; }
    .label-ru { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 10px; fill: #333; font-style: italic; }
    .title    { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #000; }
    .src      { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 10px; fill: #555; }
    .eq       { font-family: "Times New Roman", serif; font-size: 13px; fill: #000; }
  </style>

  <rect class="bg" width="1100" height="700"/>

  <!-- Title band -->
  <rect x="0" y="0" width="1100" height="48" fill="#000"/>
  <text x="550" y="22" text-anchor="middle" class="title" fill="#fff">ЭРП — Структура трёхслойного электромагнита (Рис. 1, Frolov 2003)</text>
  <text x="550" y="40" text-anchor="middle" class="label-sm" fill="#fff">EWS — Three-section electromagnet, axial offset d, phase-shifted wavefronts · Идея В.А. Черноброва, конструкция А.В. Фролова</text>

  <!-- Axis line (the optical / magnetic axis) -->
  <line x1="80" y1="380" x2="1020" y2="380" class="thin"/>
  <line x1="80" y1="380" x2="1020" y2="380" class="dashed"/>
  <text x="1030" y="385" class="label-sm">ось / axis</text>

  <!-- Single-phase pulse generator (left) -->
  <rect x="100" y="320" width="100" height="120" class="gen"/>
  <text x="150" y="350" text-anchor="middle" class="label">Генератор</text>
  <text x="150" y="364" text-anchor="middle" class="label-sm">импульсов</text>
  <text x="150" y="380" text-anchor="middle" class="label-sm">(однофазный)</text>
  <text x="150" y="396" text-anchor="middle" class="label-ru">Single-phase</text>
  <text x="150" y="408" text-anchor="middle" class="label-ru">pulse generator</text>
  <!-- gen sine icon -->
  <path d="M 115 425 q 8 -10 16 0 t 16 0 t 16 0 t 16 0" stroke="#000" fill="none" stroke-width="1"/>

  <!-- Output terminals 4 (top) and 5 (bottom) -->
  <line x1="200" y1="340" x2="240" y2="340" class="lead"/>
  <line x1="200" y1="420" x2="240" y2="420" class="lead"/>
  <text x="210" y="334" class="label-sm">4</text>
  <text x="210" y="436" class="label-sm">5</text>

  <!-- Common bus from terminals to first coil -->
  <line x1="240" y1="340" x2="320" y2="340" class="lead"/>
  <line x1="240" y1="420" x2="320" y2="420" class="lead"/>

  <!-- Three current-section coils i1, i2, i3 along axis, separated by distance d -->
  <!-- coil 1: i1 -->
  <g>
    <rect x="320" y="320" width="100" height="120" class="coil"/>
    <!-- coil winding decoration: slanted lines -->
    <g stroke="#000" stroke-width="0.8" fill="none">
      <line x1="330" y1="320" x2="340" y2="440"/>
      <line x1="345" y1="320" x2="355" y2="440"/>
      <line x1="360" y1="320" x2="370" y2="440"/>
      <line x1="375" y1="320" x2="385" y2="440"/>
      <line x1="390" y1="320" x2="400" y2="440"/>
      <line x1="405" y1="320" x2="415" y2="440"/>
    </g>
    <text x="370" y="468" text-anchor="middle" class="label">i₁</text>
  </g>

  <!-- jumper from coil 1 to coil 2 -->
  <line x1="420" y1="340" x2="500" y2="340" class="lead"/>
  <line x1="420" y1="420" x2="500" y2="420" class="lead"/>

  <!-- coil 2: i2 -->
  <g>
    <rect x="500" y="320" width="100" height="120" class="coil"/>
    <g stroke="#000" stroke-width="0.8" fill="none">
      <line x1="510" y1="320" x2="520" y2="440"/>
      <line x1="525" y1="320" x2="535" y2="440"/>
      <line x1="540" y1="320" x2="550" y2="440"/>
      <line x1="555" y1="320" x2="565" y2="440"/>
      <line x1="570" y1="320" x2="580" y2="440"/>
      <line x1="585" y1="320" x2="595" y2="440"/>
    </g>
    <text x="550" y="468" text-anchor="middle" class="label">i₂</text>
  </g>

  <!-- jumper from coil 2 to coil 3 -->
  <line x1="600" y1="340" x2="680" y2="340" class="lead"/>
  <line x1="600" y1="420" x2="680" y2="420" class="lead"/>

  <!-- coil 3: i3 -->
  <g>
    <rect x="680" y="320" width="100" height="120" class="coil"/>
    <g stroke="#000" stroke-width="0.8" fill="none">
      <line x1="690" y1="320" x2="700" y2="440"/>
      <line x1="705" y1="320" x2="715" y2="440"/>
      <line x1="720" y1="320" x2="730" y2="440"/>
      <line x1="735" y1="320" x2="745" y2="440"/>
      <line x1="750" y1="320" x2="760" y2="440"/>
      <line x1="765" y1="320" x2="775" y2="440"/>
    </g>
    <text x="730" y="468" text-anchor="middle" class="label">i₃</text>
  </g>

  <!-- Optional ferromagnetic core 6 running through all three coils (centerline) -->
  <rect x="320" y="370" width="460" height="20" class="core"/>
  <text x="800" y="385" class="label-sm">сердечник 6 / core (опц.)</text>
  <text x="800" y="397" class="label-ru">magnetostrictive (Рис. 2)</text>

  <!-- Distance d markers between coil centers -->
  <line x1="370" y1="500" x2="550" y2="500" class="dim"/>
  <polygon points="370,500 380,496 380,504" fill="#000"/>
  <polygon points="550,500 540,496 540,504" fill="#000"/>
  <text x="460" y="494" text-anchor="middle" class="label">d</text>

  <line x1="550" y1="500" x2="730" y2="500" class="dim"/>
  <polygon points="550,500 560,496 560,504" fill="#000"/>
  <polygon points="730,500 720,496 720,504" fill="#000"/>
  <text x="640" y="494" text-anchor="middle" class="label">d</text>

  <text x="550" y="520" text-anchor="middle" class="label-sm">осевое смещение / axial offset between current sections</text>

  <!-- Pulse-front travel arrow (i0) -->
  <line x1="240" y1="290" x2="800" y2="290" class="lead"/>
  <polygon points="800,290 790,285 790,295" fill="#000"/>
  <text x="240" y="280" class="label-sm">i₀ — фронт импульса / pulse front (propagates left → right at c)</text>

  <!-- Phase-shifted wavefronts emitted from each coil, expanding outward -->
  <!-- coil 1 wave (earliest, largest radii) - orange -->
  <g class="wave1">
    <path d="M 370 320 A 110 110 0 0 1 370 230" />
    <path d="M 370 320 A 90 90 0 0 1 370 250" />
    <path d="M 370 320 A 70 70 0 0 1 370 270" />
  </g>
  <text x="320" y="220" class="label-sm" fill="#b34700">волна 1 / wave 1 (опережает / leads)</text>

  <!-- coil 2 wave (middle delay) - green -->
  <g class="wave2">
    <path d="M 550 320 A 80 80 0 0 1 550 240" />
    <path d="M 550 320 A 60 60 0 0 1 550 260" />
    <path d="M 550 320 A 40 40 0 0 1 550 280" />
  </g>
  <text x="500" y="232" class="label-sm" fill="#006a4e">волна 2 / wave 2 (задержка T = d/c)</text>

  <!-- coil 3 wave (latest, smallest radii) - blue -->
  <g class="wave3">
    <path d="M 730 320 A 50 50 0 0 1 730 270" />
    <path d="M 730 320 A 30 30 0 0 1 730 290" />
  </g>
  <text x="690" y="244" class="label-sm" fill="#0050a0">волна 3 / wave 3 (задержка 2T)</text>

  <!-- Phase-relation timeline (below) -->
  <g transform="translate(80 560)">
    <line x1="0" y1="0" x2="780" y2="0" class="thin"/>
    <text x="-40" y="4" class="label-sm">t →</text>
    <!-- pulse marker 1 -->
    <line x1="60" y1="-12" x2="60" y2="12" stroke="#b34700" stroke-width="2"/>
    <text x="60" y="-18" text-anchor="middle" class="label-sm" fill="#b34700">i₁(t₀)</text>
    <!-- pulse marker 2 -->
    <line x1="240" y1="-12" x2="240" y2="12" stroke="#006a4e" stroke-width="2"/>
    <text x="240" y="-18" text-anchor="middle" class="label-sm" fill="#006a4e">i₂(t₀+T)</text>
    <!-- pulse marker 3 -->
    <line x1="420" y1="-12" x2="420" y2="12" stroke="#0050a0" stroke-width="2"/>
    <text x="420" y="-18" text-anchor="middle" class="label-sm" fill="#0050a0">i₃(t₀+2T)</text>
    <!-- T spans -->
    <line x1="60" y1="28" x2="240" y2="28" class="dim"/>
    <polygon points="60,28 70,24 70,32" fill="#000"/>
    <polygon points="240,28 230,24 230,32" fill="#000"/>
    <text x="150" y="42" text-anchor="middle" class="label-sm">T = d/c</text>
    <line x1="240" y1="28" x2="420" y2="28" class="dim"/>
    <polygon points="240,28 250,24 250,32" fill="#000"/>
    <polygon points="420,28 410,24 410,32" fill="#000"/>
    <text x="330" y="42" text-anchor="middle" class="label-sm">T = d/c</text>
  </g>

  <!-- Annotation box: d = 7 mm → 43 GHz -->
  <rect x="820" y="540" width="240" height="100" fill="#fff5cc" stroke="#000" stroke-width="1"/>
  <text x="940" y="560" text-anchor="middle" class="label" font-weight="bold">d = 7 мм → f ≈ 43 ГГц</text>
  <text x="940" y="576" text-anchor="middle" class="label-sm">d = 7 mm → f ≈ 43 GHz (mm-wave EHF)</text>
  <text x="830" y="596" class="eq">T = d / c = 2,335 × 10⁻¹¹ с</text>
  <text x="830" y="612" class="eq">f = 1 / T ≈ 4,28 × 10¹⁰ Гц</text>
  <text x="830" y="630" class="label-sm">«без полупроводников и р/тех элементов»</text>

  <!-- Callouts -->
  <line x1="150" y1="320" x2="200" y2="180" class="thin"/>
  <text x="80" y="170" class="label">Однофазный импульсный генератор</text>
  <text x="80" y="184" class="label-ru">Single-phase pulse generator (Рис. 1, поз. 4–5)</text>

  <line x1="730" y1="380" x2="900" y2="160" class="thin"/>
  <text x="800" y="150" class="label">3 участка тока на одной оси</text>
  <text x="800" y="164" class="label-ru">3 current sections on one axis,</text>
  <text x="800" y="178" class="label-ru">offset by d → propagation phase shift</text>

  <!-- Footer -->
  <line x1="40" y1="660" x2="1060" y2="660" class="thin"/>
  <text x="550" y="676" text-anchor="middle" class="src">Источники / Sources: F-12R §2 (lines 293–342) · NE-03-PG-C3 · MASTER §2.3 · Чернобров+Фролов, НЭ №3, 2003</text>
  <text x="550" y="690" text-anchor="middle" class="src">ASRP · chernobrov-archive/diagrams/erp_solenoid_structure.svg</text>
</svg>
