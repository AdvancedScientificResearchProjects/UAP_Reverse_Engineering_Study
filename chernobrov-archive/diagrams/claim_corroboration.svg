  <text class="footer" x="32" y="694">Judgement notes: Bartini 6D is an independent Soviet formalism directly matching Chernobrov's date/variant/density triple → ✓. BLT Research (W.C. Levengood 1994+) corroborates physical-anomaly reality of crop formations but not the time-connection → ~. RU patent DISCONTINUED 21 Apr 2005 (FA92) → ✗ for "granted" reading. Academic silence ≠ falsification (see §12.3), scored ✗ where no peer-reviewed path exists.</text>
